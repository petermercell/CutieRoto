# cutie311-mac — conda env for tracing CutieRoto models on Apple Silicon (MPS).
#
# This is the macOS analogue of 000_CutieInstallGuide/environment.yml. The
# difference that matters: NO CUDA. On Apple Silicon there is no cu128 torch, no
# TensorRT, no pycuda, no onnxruntime-gpu. We only need enough to run
# trace_all_stages_mps.py (+ the fusion trace) — i.e. torch + Cutie + deps.
#
# torch is plain 2.7.1 (the macOS arm64 wheel is CPU+MPS) to match Nuke 17's
# bundled libtorch 2.7.1.
#
# Reproduce:   conda env create -f environment.mac.yml
# Then (NOT in this file — see the commands in the chat / README):
#   - git clone Cutie, then:  cd Cutie && pip install -e . --no-deps
#   - thin-plate-spline:      pip install "git+https://github.com/cheind/py-thin-plate-spline" --no-deps
#   - weights:                python cutie/utils/download_models.py   (or reuse cutie-base-mega.pth)

name: cutie311-mac
channels:
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
      # plain macOS arm64 wheels = CPU + MPS, matched to Nuke 17 (2.7.1)
      - torch==2.7.1
      - torchvision==0.22.1
      # Cutie runtime deps (curated; same set as the Linux env, minus CUDA/TRT/ONNX)
      - faust-cchardet==2.1.19
      - hydra-core==1.3.2
      - omegaconf==2.3.0
      - einops==0.8.2
      - opencv-python==4.13.0.92
      - pillow==12.2.0
      - tqdm==4.67.3
      - OpenEXR==3.4.11
      - scipy==1.17.1
      - requests==2.34.2
      #
      # Deliberately OMITTED on macOS (CUDA/Linux only, won't install):
      #   tensorrt, pycuda, onnxruntime-gpu, torch/torchvision +cu128 builds
      #   (ONNX/onnxruntime aren't needed to TRACE the .pt; add plain
      #    `onnxruntime` only if you later want an ONNX/CoreML path.)
